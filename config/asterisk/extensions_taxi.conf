; ============================================================
; 大豐計程車 - Asterisk Dialplan（MixMonitor + BackgroundDetect 版）
; ============================================================
;
; 流程：來電 → 接聽 → MixMonitor 全程錄音（含聲道分離）→ BackgroundDetect 播歡迎語
;       路徑 A（客戶插話）→ greeting 停止 → WaitForSilence → 掛斷
;       路徑 B（客戶沒插話）→ 嗶聲 → WaitForSilence → 掛斷
;       掛斷 → StopMixMonitor → webhook
;
; 錄音檔案：
;   混合音軌：/var/spool/asterisk/recording/{UNIQUEID}.wav（系統語音+客人語音）
;   客人音軌：/var/spool/asterisk/recording/{UNIQUEID}-caller.wav（僅客人語音）
;
; 最後更新：2026-03-18
; ============================================================

[from-phone]

; === 通用來電處理 ===
exten => _X.,1,NoOp(=== 來電: ${CALLERID(num)} → ${EXTEN} ===)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Set(CALL_ID=${UNIQUEID})
 same => n,Set(CALLER_NUM=${CALLERID(num)})
 same => n,Set(REC_FILE=/var/spool/asterisk/recording/${CALL_ID}.wav)
 same => n,Set(REC_FILE_CALLER=/var/spool/asterisk/recording/${CALL_ID}-caller.wav)
 same => n,MixMonitor(${REC_FILE},r(${REC_FILE_CALLER}))
 same => n,BackgroundDetect(custom/taxi-greeting,1500,300,15000)
 ; --- 路徑 B：greeting 播完，客戶沒插話 ---
 same => n,Playback(beep)                       ; 提示音：輪到你說了
 same => n,WaitForSilence(3000,1,20)            ; 等客人說完（靜音 3 秒結束）
 same => n,StopMixMonitor()
 same => n,Hangup()

; === s 擴展（HT813 FXO） ===
exten => s,1,NoOp(=== 來電(s): ${CALLERID(num)} ===)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Set(CALL_ID=${UNIQUEID})
 same => n,Set(CALLER_NUM=${CALLERID(num)})
 same => n,Set(REC_FILE=/var/spool/asterisk/recording/${CALL_ID}.wav)
 same => n,Set(REC_FILE_CALLER=/var/spool/asterisk/recording/${CALL_ID}-caller.wav)
 same => n,MixMonitor(${REC_FILE},r(${REC_FILE_CALLER}))
 same => n,BackgroundDetect(custom/taxi-greeting,1500,300,15000)
 same => n,Playback(beep)
 same => n,WaitForSilence(3000,1,20)
 same => n,StopMixMonitor()
 same => n,Hangup()

; === 路徑 A：客戶在 greeting 播放中插話 ===
exten => talk,1,NoOp(=== Barge-in! 客戶在 greeting 中說話 (${TALK_DETECTED}ms) ===)
 same => n,WaitForSilence(3000,1,25)            ; 等客人說完
 same => n,StopMixMonitor()
 same => n,Hangup()

; === 掛斷事件（所有路徑統一觸發 webhook） ===
; Hangup() 或客人主動掛斷都會進這裡，webhook 只呼叫一次
exten => h,1,NoOp(=== 通話結束: ${CALL_ID}, 來電: ${CALLER_NUM}, 時長: ${CDR(duration)}s ===)
 same => n,StopMixMonitor()
 same => n,System(/usr/local/bin/taxi-webhook.sh ${CALL_ID} ${CALLER_NUM} ${CDR(duration)} ${REC_FILE})
