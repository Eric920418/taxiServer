; ============================================================
; 大豐計程車 - Asterisk Dialplan（Voice Barge-in 版）
; ============================================================
;
; 流程：來電 → 接聽 → 錄音開始 → BackgroundDetect 播歡迎語
;       ├─ 客戶插話 → 跳 talk extension → 等說完 → 掛斷 → webhook
;       └─ 客戶沒插話 → 等客戶開口 → 等說完 → 掛斷 → webhook
;
; 歡迎語音檔：/var/lib/asterisk/sounds/custom/taxi-greeting.wav
; 錄音存放：  /var/spool/asterisk/recording/{UNIQUEID}.wav
; Webhook：   /usr/local/bin/taxi-webhook.sh
;
; 部署方式：
;   sudo cp extensions_taxi.conf /etc/asterisk/extensions_taxi.conf
;   sudo asterisk -rx 'dialplan reload'
;
; 最後更新：2026-03-14
; ============================================================

[from-phone]

; === 通用來電處理（_X. 匹配任何數字分機） ===
exten => _X.,1,NoOp(=== 來電: ${CALLERID(num)} → ${EXTEN} ===)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Set(CALL_ID=${UNIQUEID})
 same => n,Set(CALLER_NUM=${CALLERID(num)})
 same => n,Set(REC_FILE=/var/spool/asterisk/recording/${CALL_ID}.wav)
 same => n,MixMonitor(${REC_FILE})
 same => n,BackgroundDetect(custom/taxi-greeting,1000,200,10000)
 ; --- 路徑 B：greeting 播完，客戶沒插話 ---
 same => n,WaitForNoise(300,1,15)
 same => n,WaitForSilence(3000,1,30)
 same => n,StopMixMonitor()
 same => n,Hangup()

; === 路徑 A：客戶在 greeting 播放中插話 ===
exten => talk,1,NoOp(=== Barge-in! 客戶插話 (${TALK_DETECTED}ms) ===)
 same => n,WaitForSilence(3000,1,30)
 same => n,StopMixMonitor()
 same => n,Hangup()

; === s 擴展（HT813 FXO 來電可能用 s） ===
exten => s,1,NoOp(=== 來電(s): ${CALLERID(num)} ===)
 same => n,Answer()
 same => n,Wait(0.5)
 same => n,Set(CALL_ID=${UNIQUEID})
 same => n,Set(CALLER_NUM=${CALLERID(num)})
 same => n,Set(REC_FILE=/var/spool/asterisk/recording/${CALL_ID}.wav)
 same => n,MixMonitor(${REC_FILE})
 same => n,BackgroundDetect(custom/taxi-greeting,1000,200,10000)
 same => n,WaitForNoise(300,1,15)
 same => n,WaitForSilence(3000,1,30)
 same => n,StopMixMonitor()
 same => n,Hangup()

; === 掛斷事件（路徑 A/B 都會觸發） ===
exten => h,1,NoOp(=== 通話結束: ${CALL_ID}, 來電: ${CALLER_NUM}, 時長: ${CDR(duration)}s ===)
 same => n,System(/usr/local/bin/taxi-webhook.sh ${CALL_ID} ${CALLER_NUM} ${CDR(duration)} ${REC_FILE})
