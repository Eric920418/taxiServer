;==============================================================
; pjsip_fet.conf — 遠傳 FET SIP Trunk（大豐計程車行）
;--------------------------------------------------------------
; ★ 本檔為 box:/etc/asterisk/pjsip_fet.conf 的版控快照（實際部署值）。
;   接線真相（實測，非文件值）：
;     本端 SIP IP : 210.243.167.38   port 5060/UDP   ← 非文件的 .33/TCP
;     FET SBC 訊令: 123.51.252.5      (signaling)
;     FET SBC 語音: 123.51.252.4      (RTP)
;     認證        : IP 認證（無帳密，靠來源 IP 123.51.252.5 比對）
;     DID         : 038907320 ~ 038907329（9 碼，無連字號）
;   安裝：/etc/asterisk/pjsip.conf 末尾 #include pjsip_fet.conf
;   套用：asterisk -rx "pjsip reload"
;==============================================================
[transport-fet-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060
external_media_address=210.243.167.38
external_signaling_address=210.243.167.38
local_net=192.168.0.0/16

[fet-endpoint]
type=endpoint
transport=transport-fet-udp
context=from-fet
disallow=all
allow=alaw
allow=ulaw
direct_media=no
rtp_symmetric=yes
force_rport=yes
rewrite_contact=yes
dtmf_mode=rfc4733
from_user=038907320
from_domain=210.243.167.38
aors=fet-aor

[fet-aor]
type=aor
contact=sip:123.51.252.5:5060
qualify_frequency=15

[fet-identify]
type=identify
endpoint=fet-endpoint
match=123.51.252.5
