# =============================================================
# recordings-http.conf — 錄音檔唯讀 HTTP（供首爾後端經反向隧道 fetch）
# -------------------------------------------------------------
# ★ 本檔為 box:/etc/nginx/sites-enabled/recordings 的版控快照。
# 設計：listen 127.0.0.1:8090（不直接對公網），由 box-tunnel-http.service
#       的反向 SSH 隧道把 8090 轉到首爾 Lightsail，後端
#       PhoneCallProcessor.downloadRecording() 以 recording_url HTTP 抓回。
# 安全：只服務檔名.wav；regex 含「.」因 Asterisk UNIQUEID 形如 1782193037.0；
#       唯讀、no-store；其餘路徑 403。
# 安裝：
#   sudo cp recordings-http.conf /etc/nginx/sites-available/recordings
#   sudo ln -s /etc/nginx/sites-available/recordings /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# 註：root 的父層 /var/spool/asterisk 需 chmod o+x，nginx 才進得去。
# =============================================================
server {
    listen 127.0.0.1:8090;
    server_name _;
    location ~ "^/(?<recfile>[A-Za-z0-9._-]+\.wav)$" {
        root /var/spool/asterisk/recording;
        try_files /$recfile =404;
        add_header Cache-Control "no-store" always;
        default_type audio/wav;
    }
    location / { return 403; }
}
