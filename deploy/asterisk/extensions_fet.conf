;==============================================================
; extensions_fet.conf — 大豐 / FET trunk 進線路由 + 出局送碼
;--------------------------------------------------------------
; ★ 本檔為 box(asterisk-pbx):/etc/asterisk/extensions_fet.conf 的版控快照。
;   可執行行與 box 實際在跑的內容一致；架構說明見 README「電話叫車」章節。
;   安裝：/etc/asterisk/extensions.conf 末尾 #include extensions_fet.conf
;   套用：asterisk -rx "dialplan reload"
;
; 兩條路徑共用同一條後端派單核心（與 App/LINE 同管線）：
;   · 即時 AI 語音客服 taxi-ai     → AudioSocket → bridge.mjs ↔ OpenAI Realtime
;   · MVP 掛斷分析建單 taxi-intake → 錄音 → webhook → Whisper/GPT
;==============================================================

; 進線落地：10 門 DID(038907320~329) 先進 taxi-route 判斷並發
; 038907329 保留當「中繼遮蔽號」（司機↔客人轉接），不進叫車流程
[from-fet]
exten => 038907329,1,Goto(relay-in,s,1)
exten => _03890732X,1,Goto(taxi-route,s,1)
exten => _.,1,Goto(taxi-route,s,1)

; 並發閘門：即時 AI 通數 < 3 → taxi-ai；否則退回 taxi-intake(MVP 錄音分析)
; 注意：此閘門擋「AI 滿載」；bridge 程序整個掛掉(非滿載)時 taxi-ai 會走到
; AudioSocket 連不上而 Hangup，目前靠 systemd Restart=always 緩解（見 README）。
[taxi-route]
exten => s,1,NoOp(路由 來電=${CALLERID(num)} AI並發=${GROUP_COUNT(aicall)})
 same => n,GotoIf($[${GROUP_COUNT(aicall)} < 3]?ai:mvp)
 same => n(ai),Set(GROUP()=aicall)
 same => n,Goto(taxi-ai,s,1)
 same => n(mvp),Goto(taxi-intake,s,1)

; 即時 AI 語音客服：生 UUID → 把 caller 註冊給 bridge → AudioSocket 接 bridge
[taxi-ai]
exten => s,1,Answer()
 same => n,Set(AIUUID=${SHELL(uuidgen | tr -d '\n')})
 same => n,System(curl -s -m 2 -X POST http://127.0.0.1:9091/call-start --data-urlencode "uuid=${AIUUID}" --data-urlencode "caller=${CALLERID(num)}")
 same => n,AudioSocket(${AIUUID},127.0.0.1:9092)
 same => n,Hangup()

[taxi-intake]
exten => s,1,NoOp(電話叫車(MVP) 來電=${CALLERID(num)} DID=${EXTEN} UID=${UNIQUEID})
 same => n,Answer()
 same => n,MixMonitor(${UNIQUEID}.wav,r(/var/spool/asterisk/recording/${UNIQUEID}-caller.wav))
 same => n,Playback(/var/lib/asterisk/sounds/custom/greeting-taxi)
 same => n,WaitForSilence(4000,2,45)
 same => n,Playback(/var/lib/asterisk/sounds/custom/got-it)
 same => n,Hangup()
exten => h,1,System(/etc/asterisk/scripts/fire-webhook.sh "${UNIQUEID}" "${CALLERID(num)}" "${CDR(duration)}")

; 出局送碼（Phase 3 回撥 + 一般外撥）：主叫一律代表號 038907320
; 手機加 MVNO 前綴 9004；市話/長途原樣；國際 007
[fet-outbound]
exten => _09XXXXXXXX,1,Set(CALLERID(num)=038907320)
 same => n,Dial(PJSIP/9004${EXTEN}@fet-endpoint,60)
 same => n,Hangup()

exten => _007X.,1,Set(CALLERID(num)=038907320)
 same => n,Dial(PJSIP/${EXTEN}@fet-endpoint,90)
 same => n,Hangup()

exten => _0X.,1,Set(CALLERID(num)=038907320)
 same => n,Dial(PJSIP/${EXTEN}@fet-endpoint,60)
 same => n,Hangup()

; 中繼遮蔽：來電(中繼號 038907329) → curl 後端查「來電真號」對應的另一方真號
;  → 經 fet-outbound 橋接（代表號 038907320 當主叫，雙方都看不到對方真號）。
; relay.key 內含 BRIDGE_SECRET，放 box 本地 /etc/asterisk/relay.key（asterisk 可讀、不進 repo）。
[relay-in]
exten => s,1,Answer()
 same => n,Set(RKEY=${SHELL(cat /etc/asterisk/relay.key 2>/dev/null | tr -d '\n')})
 same => n,Set(TARGET=${CURL(https://api.hualientaxi.taxi/api/relay/lookup?from=${CALLERID(num)}&did=${EXTEN}&key=${RKEY})})
 same => n,NoOp(relay from=${CALLERID(num)} → target=${TARGET})
 same => n,GotoIf($["${TARGET}" = ""]?fail)
 same => n,Goto(fet-outbound,${TARGET},1)
 same => n(fail),NoOp(中繼查無對應行程，掛斷)
 same => n,Hangup()
