<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>花蓮計程車 - 一鍵叫車</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body {
      font-family: 'Noto Sans TC', sans-serif;
      background: #F5F5F5;
      color: #212121;
      min-height: 100vh;
      padding: 20px;
      padding-bottom: 80px;
    }
    .header { font-size: 32px; font-weight: 900; text-align: center; padding: 20px 0; color: #1976D2; }
    .subtitle { font-size: 18px; text-align: center; color: #757575; margin-bottom: 24px; }
    .card { background: #fff; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .card-label { font-size: 20px; font-weight: 700; color: #757575; margin-bottom: 8px; }
    .card-main { font-size: 28px; font-weight: 700; color: #212121; line-height: 1.3; margin-bottom: 4px; }
    .card-sub { font-size: 16px; color: #757575; line-height: 1.4; }
    .btn-primary {
      width: 100%; height: 80px; background: #4CAF50; color: #fff; border: none;
      border-radius: 16px; font-family: inherit; font-size: 28px; font-weight: 900;
      margin-top: 20px; cursor: pointer; box-shadow: 0 4px 12px rgba(76,175,80,0.3);
    }
    .btn-primary:disabled { background: #BDBDBD; box-shadow: none; }
    .btn-secondary {
      flex: 1; height: 56px; background: #fff; color: #1976D2;
      border: 2px solid #1976D2; border-radius: 12px;
      font-family: inherit; font-size: 18px; font-weight: 700; cursor: pointer;
    }
    .btn-row { display: flex; gap: 12px; margin-top: 12px; }
    .link-row { text-align: center; margin-top: 20px; }
    .link-row a { color: #1976D2; font-size: 16px; font-weight: 700; text-decoration: none; cursor: pointer; }
    .loading { text-align: center; padding: 60px 20px; font-size: 22px; color: #757575; }
    .loading::before {
      content: ''; display: inline-block; width: 40px; height: 40px;
      border: 4px solid #E0E0E0; border-top-color: #1976D2; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-right: 12px; vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-box {
      background: #FFEBEE; border: 2px solid #D32F2F; border-radius: 12px;
      padding: 16px; color: #C62828; font-size: 18px; font-weight: 700;
      line-height: 1.5; margin-bottom: 16px;
    }
    .empty-state { text-align: center; padding: 40px 20px; }
    .empty-state .icon { font-size: 64px; margin-bottom: 16px; }
    .empty-state h2 { font-size: 24px; font-weight: 700; margin-bottom: 12px; color: #212121; }
    .empty-state p { font-size: 18px; color: #757575; line-height: 1.5; margin-bottom: 24px; }
    .dest-option {
      background: #fff; border: 2px solid #E0E0E0; border-radius: 12px;
      padding: 16px 20px; margin-bottom: 12px; cursor: pointer;
      transition: all 0.15s; text-align: left; width: 100%; font-family: inherit;
    }
    .dest-option:active { border-color: #1976D2; background: #E3F2FD; }
    .dest-option .name { font-size: 22px; font-weight: 700; color: #212121; margin-bottom: 4px; }
    .dest-option .addr { font-size: 14px; color: #757575; }
    .section-title { font-size: 20px; font-weight: 700; margin: 20px 0 12px 0; color: #212121; }
    .toast {
      position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.85); color: #fff; padding: 14px 22px;
      border-radius: 24px; font-size: 16px; font-weight: 700;
      z-index: 9999; opacity: 0; transition: opacity 0.3s;
      max-width: 90vw; text-align: center;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>
  <div class="header">🚗 一鍵叫車</div>

  <div id="content"></div>

  <div class="toast" id="toast"></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script>
    let accessToken = null;
    let liffProfile = null;
    let suggested = null;
    let myAddresses = [];

    const content = document.getElementById('content');

    // ===== 通用安全 DOM helpers =====
    function el(tag, attrs, text) {
      const e = document.createElement(tag);
      if (attrs) for (const k in attrs) {
        if (k === 'class') e.className = attrs[k];
        else if (k === 'style') e.style.cssText = attrs[k];
        else if (k.startsWith('on')) e.addEventListener(k.substring(2), attrs[k]);
        else e.setAttribute(k, attrs[k]);
      }
      if (text != null) e.textContent = String(text);
      return e;
    }
    function clearContent() {
      while (content.firstChild) content.removeChild(content.firstChild);
    }

    function showToast(msg, ms) {
      const t = document.getElementById('toast');
      t.textContent = String(msg);
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), ms || 3000);
    }

    function renderLoading(msg) {
      clearContent();
      content.appendChild(el('div', { class: 'loading' }, msg || '處理中...'));
    }

    function renderError(msg) {
      clearContent();
      content.appendChild(el('div', { class: 'error-box' }, '⚠️ ' + msg));
      content.appendChild(el('button', {
        class: 'btn-primary',
        style: 'background:#1976D2',
        onclick: () => location.reload()
      }, '重試'));
      const link = el('div', { class: 'link-row' });
      const a = el('a', { href: '/liff/booking.html?mode=call' }, '改用詳細叫車');
      link.appendChild(a);
      content.appendChild(link);
    }

    async function init() {
      try {
        await liff.init({ liffId: '2009663432-cTe2V6kL' });
        if (!liff.isLoggedIn()) { liff.login(); return; }
        liffProfile = await liff.getProfile();
        accessToken = liff.getAccessToken();
      } catch (e) {
        renderError('LIFF 初始化失敗：' + (e.message || e));
        return;
      }

      renderLoading('正在取得您的位置...');

      if (!navigator.geolocation) {
        renderError('您的裝置不支援 GPS 定位，請改用「詳細叫車」');
        return;
      }
      navigator.geolocation.getCurrentPosition(
        async (pos) => { await fetchSuggestion(pos.coords.latitude, pos.coords.longitude); },
        (err) => { renderError('無法取得 GPS 位置（' + err.message + '）— 請允許定位權限後重新整理'); },
        { timeout: 10000, enableHighAccuracy: true }
      );
    }

    async function reverseGeocode(lat, lng) {
      try {
        const cfg = await (await fetch('/api/line/liff/config')).json();
        if (!cfg.googleMapsApiKey) return '目前位置';
        const url = `https://maps.googleapis.com/maps/api/geocode/json?latlng=${lat},${lng}&language=zh-TW&key=${cfg.googleMapsApiKey}`;
        const r = await (await fetch(url)).json();
        if (r.results && r.results[0]) {
          return r.results[0].formatted_address
            .replace(/^\s*\d{3,6}\s*[,，]?\s*/, '')
            .replace(/^\s*(台灣|Taiwan)\s*[,，]?\s*/i, '')
            .trim();
        }
      } catch (e) { console.warn('reverseGeocode failed:', e); }
      return '目前位置';
    }

    // 原始 GPS 上車點（零設定的人靠這個送單）
    let rawPickup = null;

    async function fetchSuggestion(lat, lng) {
      try {
        const pickupAddress = await reverseGeocode(lat, lng);
        rawPickup = { lat, lng, address: pickupAddress };

        // 並行拿「上車點 snap 建議」+「常用地點清單」，皆失敗也不擋（rawPickup 一定能送單）
        const [suggestRes, addrRes] = await Promise.allSettled([
          fetch('/api/line/liff/one-click-suggest', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
            body: JSON.stringify({ pickupLat: lat, pickupLng: lng, pickupAddress }),
          }).then(r => r.json()),
          fetch('/api/line/liff/my-addresses', {
            headers: { 'Authorization': `Bearer ${accessToken}` }
          }).then(r => r.json()),
        ]);

        suggested = suggestRes.status === 'fulfilled' ? suggestRes.value : { status: 'NO_ADDRESSES' };
        myAddresses = (addrRes.status === 'fulfilled' && addrRes.value.addresses) ? addrRes.value.addresses : [];

        renderMain();
      } catch (e) {
        renderError('連線失敗：' + e.message);
      }
    }

    /**
     * 統一主畫面（真·一鍵）：上車點卡 + 大鈕「立刻叫車」+（有常用點才顯示）目的地捷徑
     */
    function renderMain() {
      clearContent();

      const pickup = (suggested && suggested.pickup) ? suggested.pickup : rawPickup;
      const pickupLabel = (pickup && pickup.fromFavorite) ? pickup.favoriteName : '目前位置';
      const pickupAddr = (pickup && pickup.address) ? pickup.address : '定位中...';

      const pickCard = el('div', { class: 'card' });
      pickCard.appendChild(el('div', { class: 'card-label' }, '📍 上車點'));
      pickCard.appendChild(el('div', { class: 'card-main' }, pickupLabel));
      pickCard.appendChild(el('div', { class: 'card-sub' }, pickupAddr));
      content.appendChild(pickCard);

      const fireBtn = el('button', {
        class: 'btn-primary',
        style: 'height:96px;font-size:32px',
        onclick: () => fireDispatch(pickup, null),
      }, '🚖 立刻叫車');
      content.appendChild(fireBtn);
      content.appendChild(el('div', {
        style: 'text-align:center;color:#757575;font-size:15px;margin-top:8px'
      }, '不用設定，按一下司機馬上來'));

      if (myAddresses.length > 0) {
        content.appendChild(el('div', { class: 'section-title', style: 'margin-top:28px' }, '想指定目的地？（選填）'));
        myAddresses.forEach(a => {
          const btn = el('div', {
            class: 'dest-option',
            onclick: () => fireDispatch(pickup, a),
          });
          btn.appendChild(el('div', { class: 'name' }, '🎯 ' + a.displayName));
          btn.appendChild(el('div', { class: 'addr' }, a.address));
          content.appendChild(btn);
        });
      }

      const link1 = el('div', { class: 'link-row', style: 'margin-top:24px' });
      link1.appendChild(el('a', { onclick: goToAddresses }, '📍 管理我的常用地點'));
      content.appendChild(link1);
      const link2 = el('div', { class: 'link-row', style: 'margin-top:8px' });
      link2.appendChild(el('a', { href: '/liff/booking.html?mode=call' }, '改用詳細叫車（自己選位置）'));
      content.appendChild(link2);
    }

    /**
     * 真·一鍵送單 — 立刻 POST create-order（不確認、不倒數）
     * 送出後顯示成功頁 + 大「取消叫車」鈕（誤觸防護：發車後可取消）
     *
     * @param pickup {lat, lng, address, fromFavorite?, favoriteName?}
     * @param destination null（不指定）or 常用地點 {id, displayName, address, lat, lng}
     */
    async function fireDispatch(pickup, destination) {
      if (!pickup || pickup.lat == null) {
        showToast('還在定位中，請稍候再按', 3000);
        return;
      }
      clearContent();
      content.appendChild(el('div', { class: 'loading' }, '正在為您叫車...'));

      try {
        const body = {
          pickupLat: pickup.lat,
          pickupLng: pickup.lng,
          pickupAddress: pickup.address,
          mode: 'call', paymentType: 'CASH', subsidyType: 'NONE', discountAmount: 0,
        };
        if (destination) {
          body.destLat = destination.lat;
          body.destLng = destination.lng;
          body.destAddress = destination.address;
        }
        const res = await fetch('/api/line/liff/create-order', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '叫車失敗');

        if (destination && destination.id) {
          fetch(`/api/line/liff/saved-address/${destination.id}/increment-use`, {
            method: 'POST',
            headers: { 'Authorization': `Bearer ${accessToken}` }
          }).catch(() => {});
        }

        if (liff.isInClient()) {
          const destText = destination ? `\n要去：${destination.displayName}` : '';
          try {
            await liff.sendMessages([{
              type: 'text',
              text: `我已叫車！\n上車：${pickup.fromFavorite ? pickup.favoriteName : '目前位置'}${destText}`,
            }]);
          } catch (e) { /* 無權限就略過 */ }
        }

        renderSuccess(data.orderId, pickup, destination);
      } catch (e) {
        renderError('叫車失敗：' + e.message);
      }
    }

    /** 成功頁 — 含大「取消叫車」鈕（誤觸/反悔用）*/
    function renderSuccess(orderId, pickup, destination) {
      clearContent();

      const wrap = el('div', { class: 'card', style: 'text-align:center;background:#E8F5E9;border:2px solid #4CAF50' });
      wrap.appendChild(el('div', { style: 'font-size:64px;margin-bottom:8px' }, '✅'));
      wrap.appendChild(el('div', { style: 'font-size:28px;font-weight:900;color:#2E7D32;margin-bottom:8px' }, '叫車成功！'));
      wrap.appendChild(el('div', { style: 'font-size:18px;color:#424242;line-height:1.5' }, '司機正在為您安排，請稍候'));
      content.appendChild(wrap);

      const info = el('div', { class: 'card' });
      info.appendChild(el('div', { class: 'card-label' }, '📍 上車'));
      info.appendChild(el('div', { class: 'card-sub', style: 'margin-bottom:8px' }, pickup.fromFavorite ? pickup.favoriteName : (pickup.address || '目前位置')));
      if (destination) {
        info.appendChild(el('div', { class: 'card-label' }, '🎯 要去'));
        info.appendChild(el('div', { class: 'card-sub' }, destination.displayName));
      } else {
        info.appendChild(el('div', { class: 'card-sub', style: 'color:#999' }, '（未指定目的地，上車後告訴司機即可）'));
      }
      content.appendChild(info);

      const cancelBtn = el('button', {
        class: 'btn-primary',
        id: 'cancelBtn',
        style: 'background:#D32F2F;box-shadow:0 4px 12px rgba(211,47,47,0.3)',
        onclick: () => cancelOrder(orderId),
      }, '✕ 取消叫車');
      content.appendChild(cancelBtn);

      const link = el('div', { class: 'link-row' });
      link.appendChild(el('a', { onclick: () => { if (liff.isInClient()) liff.closeWindow(); else location.reload(); } }, '關閉，回 LINE 查看'));
      content.appendChild(link);
    }

    async function cancelOrder(orderId) {
      const btn = document.getElementById('cancelBtn');
      if (btn) { btn.disabled = true; btn.textContent = '取消中...'; }
      try {
        const res = await fetch(`/api/line/liff/cancel-order/${orderId}`, {
          method: 'POST',
          headers: { 'Authorization': `Bearer ${accessToken}` },
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || '取消失敗');

        clearContent();
        const wrap = el('div', { class: 'card', style: 'text-align:center' });
        wrap.appendChild(el('div', { style: 'font-size:56px;margin-bottom:8px' }, '🚫'));
        wrap.appendChild(el('div', { style: 'font-size:24px;font-weight:700;margin-bottom:8px' }, '已取消叫車'));
        content.appendChild(wrap);
        content.appendChild(el('button', { class: 'btn-primary', onclick: () => location.reload() }, '重新叫車'));
        const link = el('div', { class: 'link-row' });
        link.appendChild(el('a', { onclick: () => { if (liff.isInClient()) liff.closeWindow(); } }, '關閉'));
        content.appendChild(link);
      } catch (e) {
        if (btn) { btn.disabled = false; btn.textContent = '✕ 取消叫車'; }
        showToast(e.message || '已無法取消（司機可能已出發）', 5000);
      }
    }

    function goToAddresses() { location.href = '/liff/my-addresses.html'; }

    init();
  </script>
</body>
</html>
