<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
  <title>重新選擇上車位置</title>
  <link rel="stylesheet" href="/liff/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="header" id="header" style="background:#FFA000;color:#fff;">⚠️ 重新選擇上車位置</div>

  <div class="map-container">
    <div id="map"></div>
    <div class="map-hint" id="mapHint" style="background:rgba(255,160,0,0.9);">拖曳地圖選擇您現在的位置</div>
  </div>

  <div class="content">
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="搜尋地址或地標...">
    </div>

    <div class="info-card">
      <div class="info-row">
        <span class="info-label">原上車點</span>
        <span class="info-value" id="originalPickup" style="color:#999;">載入中...</span>
      </div>
      <div class="info-row">
        <span class="info-label">新上車點</span>
        <span class="info-value" id="newPickup" style="color:#FFA000;font-weight:bold;">移動地圖選擇...</span>
      </div>
    </div>

    <!-- 補手機號（passengers.phone 仍是 LINE_xxx 才顯示） -->
    <div class="option-section" id="phoneSection" style="display:none;">
      <label class="section-label">📞 留下手機（選填）</label>
      <input type="tel" id="phoneInput" placeholder="例：0912345678（10 位）"
             pattern="09[0-9]{8}" maxlength="10" inputmode="numeric"
             style="width:100%;padding:12px;border:1px solid #ddd;border-radius:8px;font-size:16px;">
      <div style="font-size:12px;color:#888;margin-top:6px;">
        若司機找不到您可以打給您，不會分享給其他人。
      </div>
    </div>

    <button class="btn btn-primary" id="submitBtn" onclick="handleSubmit()" disabled style="background:#FFA000;">
      ✓ 確認新位置
    </button>
  </div>

  <div class="toast" id="toast"></div>

  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

  <script>
    let map, marker, geocoder, autocomplete;
    let pickupData = { lat: null, lng: null, address: '' };
    let liffProfile = null;
    let accessToken = null;
    let orderId = null;
    let originalOrder = null;
    let config = {};

    async function init() {
      const params = new URLSearchParams(window.location.search);
      orderId = params.get('orderId');
      if (!orderId) {
        showToast('缺少訂單 ID');
        document.getElementById('submitBtn').disabled = true;
        return;
      }

      try {
        await liff.init({ liffId: '2009663432-cTe2V6kL' });
        if (liff.isLoggedIn()) {
          liffProfile = await liff.getProfile();
          accessToken = liff.getAccessToken();
        } else {
          liff.login();
          return;
        }
      } catch (e) {
        console.error('LIFF init failed:', e);
        showToast('LIFF 初始化失敗：' + (e.message || e));
        return;
      }

      // 取得後端配置
      try {
        const res = await fetch('/api/line/liff/config');
        config = await res.json();
      } catch (e) {
        console.error('Config fetch failed:', e);
      }

      // 取得目前訂單資料（拿 pickup 起始位置 + 判斷是否已留電話）
      try {
        const res = await fetch(`/api/line/liff/order-status/${orderId}`, {
          headers: { Authorization: `Bearer ${accessToken}` },
        });
        if (!res.ok) {
          const err = await res.json().catch(() => ({}));
          showToast('載入訂單失敗：' + (err.error || res.status));
          document.getElementById('submitBtn').disabled = true;
          return;
        }
        originalOrder = await res.json();
        document.getElementById('originalPickup').textContent = originalOrder.pickup.address || '未知';

        // 顯示手機欄位（若該客人 passengers.phone 仍是 LINE_xxx）
        await checkPhoneStatus();
      } catch (e) {
        showToast('載入訂單失敗');
        return;
      }

      // 載入 Google Maps（callback initMap）
      if (config.googleMapsApiKey) {
        const script = document.createElement('script');
        script.src = `https://maps.googleapis.com/maps/api/js?key=${config.googleMapsApiKey}&libraries=places&language=zh-TW&callback=initMap`;
        script.async = true;
        document.head.appendChild(script);
      } else {
        showToast('地圖服務未設定');
      }
    }

    async function checkPhoneStatus() {
      // 簡化判斷：active-order 端 endpoint 或從 originalOrder.driver 等資訊推不到 phone status
      // 直接用啟發式：暫時都顯示手機欄位（讓客人選填，後端會檢查若已有真實 phone 不覆蓋）
      // 更好的做法是 GET 一個 /me endpoint 但目前沒有，先全部顯示
      document.getElementById('phoneSection').style.display = 'block';
    }

    function initMap() {
      const center = originalOrder?.pickup
        ? { lat: originalOrder.pickup.lat, lng: originalOrder.pickup.lng }
        : (config.defaultCenter || { lat: 23.9871, lng: 121.6015 });

      map = new google.maps.Map(document.getElementById('map'), {
        center,
        zoom: 17,
        disableDefaultUI: true,
        zoomControl: true,
        mapTypeControl: false,
        gestureHandling: 'greedy',
      });

      marker = new google.maps.Marker({
        position: center,
        map,
        draggable: true,
        animation: google.maps.Animation.DROP,
        icon: {
          path: google.maps.SymbolPath.CIRCLE,
          scale: 10,
          fillColor: '#FFA000',
          fillOpacity: 1,
          strokeColor: '#fff',
          strokeWeight: 3,
        },
      });

      geocoder = new google.maps.Geocoder();

      marker.addListener('dragend', () => {
        const pos = marker.getPosition();
        updateLocationFromLatLng(pos.lat(), pos.lng());
      });

      map.addListener('center_changed', () => {
        marker.setPosition(map.getCenter());
      });

      map.addListener('idle', () => {
        const c = map.getCenter();
        updateLocationFromLatLng(c.lat(), c.lng());
      });

      const input = document.getElementById('searchInput');
      autocomplete = new google.maps.places.Autocomplete(input, {
        componentRestrictions: { country: 'tw' },
        fields: ['geometry', 'formatted_address', 'name'],
      });

      autocomplete.addListener('place_changed', () => {
        const place = autocomplete.getPlace();
        if (place.geometry) {
          const loc = place.geometry.location;
          map.setCenter(loc);
          map.setZoom(17);
          marker.setPosition(loc);
          updateLocation(loc.lat(), loc.lng(), place.name || place.formatted_address || '');
        }
      });

      // 嘗試直接抓使用者目前位置（這正是 relocate 的核心 — 客人現在在哪）
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude };
            map.setCenter(loc);
            marker.setPosition(loc);
            updateLocationFromLatLng(loc.lat, loc.lng);
          },
          () => { /* 失敗就用訂單原 pickup */ },
          { timeout: 5000, enableHighAccuracy: true }
        );
      }
    }

    function updateLocationFromLatLng(lat, lng) {
      geocoder.geocode({ location: { lat, lng } }, (results, status) => {
        let addr = `${lat.toFixed(5)}, ${lng.toFixed(5)}`;
        if (status === 'OK' && results[0]) {
          addr = results[0].formatted_address
            .replace(/^\s*\d{3,6}\s*[,，]?\s*/, '')
            .replace(/^\s*(台灣|Taiwan)\s*[,，]?\s*/i, '')
            .trim();
        }
        updateLocation(lat, lng, addr);
      });
    }

    function updateLocation(lat, lng, address) {
      pickupData = { lat, lng, address };
      document.getElementById('newPickup').textContent = address;
      document.getElementById('submitBtn').disabled = false;
    }

    async function handleSubmit() {
      if (!pickupData.lat || !orderId) return;

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '更新中...';

      const phoneRaw = document.getElementById('phoneInput')?.value?.trim() || '';
      const phone = phoneRaw.replace(/\D/g, '');
      const phoneValid = /^09\d{8}$/.test(phone);

      const body = {
        lat: pickupData.lat,
        lng: pickupData.lng,
        address: pickupData.address,
      };
      if (phoneValid) body.phone = phone;
      else if (phoneRaw) {
        showToast('手機格式錯誤（請填 10 位數字 09 開頭）');
        btn.disabled = false;
        btn.textContent = '✓ 確認新位置';
        return;
      }

      try {
        const res = await fetch(`/api/line/liff/relocate-order/${orderId}`, {
          method: 'PATCH',
          headers: {
            'Content-Type': 'application/json',
            Authorization: `Bearer ${accessToken}`,
          },
          body: JSON.stringify(body),
        });
        const data = await res.json();
        if (!res.ok) {
          throw new Error(data.error || `${res.status}`);
        }
        showToast('✅ 位置已更新，司機會收到通知');
        setTimeout(() => {
          if (liff.isInClient()) liff.closeWindow();
          else window.close();
        }, 1500);
      } catch (e) {
        showToast('更新失敗：' + e.message);
        btn.disabled = false;
        btn.textContent = '✓ 確認新位置';
      }
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 3000);
    }

    init();
  </script>
</body>
</html>
